<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f1f" />
    <title>NoorJyoti — Sacred Audio Library</title>
    <meta
      name="description"
      content="NoorJyoti — listen to the world's great scriptures (Bible, Quran, Torah, Bhagavad Gita, Dhammapada, Upanishads, Guru Granth Sahib and more) read aloud in soothing AI voices across nine languages. Free and public domain."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="NoorJyoti" />
    <link rel="canonical" href="https://noorjyoti.app/" />

    <!-- Open Graph / social. Update the host below to your production domain. -->
    <meta property="og:site_name" content="NoorJyoti" />
    <meta property="og:title" content="NoorJyoti — Sacred Audio Library" />
    <meta
      property="og:description"
      content="Listen to the world's great scriptures read aloud in soothing AI voices across nine languages. Free and public domain."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://noorjyoti.app/" />
    <meta property="og:image" content="https://noorjyoti.app/opengraph.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NoorJyoti — Sacred Audio Library" />
    <meta
      name="twitter:description"
      content="Listen to the world's great scriptures read aloud in soothing AI voices across nine languages."
    />
    <meta name="twitter:image" content="https://noorjyoti.app/opengraph.jpg" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- fonts.bunny.net = privacy-friendly Google Fonts mirror that is reachable in mainland China -->
    <link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
    <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700&display=swap" rel="stylesheet" />

    <!-- Structured data: brand + app + FAQ (helps SEO, GEO and answer engines). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "NoorJyoti",
        "url": "https://noorjyoti.com/",
        "logo": "https://noorjyoti.com/favicon.svg",
        "description": "A free sacred-audio library that reads the world's great scriptures aloud in soothing AI voices across nine languages.",
        "sameAs": ["https://noorjyoti.com", "https://noorjyoti.app", "https://noorjyoti.world"]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "NoorJyoti",
        "url": "https://noorjyoti.app/",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Web, iOS, Android",
        "description": "Listen to the world's great scriptures read aloud in soothing AI voices across nine languages.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is NoorJyoti?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "NoorJyoti is a free sacred-audio library that reads the world's great scriptures aloud in soothing AI voices across nine languages."
            }
          },
          {
            "@type": "Question",
            "name": "Which scriptures can I listen to?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "NoorJyoti covers 21 scriptures across the major traditions, including the Bible, Quran, Torah, Bhagavad Gita, Dhammapada, Upanishads, Guru Granth Sahib and the Jain Agamas."
            }
          },
          {
            "@type": "Question",
            "name": "Is NoorJyoti free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. NoorJyoti is free, and the scripture texts it reads are in the public domain."
            }
          },
          {
            "@type": "Question",
            "name": "What languages are supported?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Scriptures can be heard in nine languages with natural AI narration."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
